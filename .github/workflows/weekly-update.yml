name: Weekly ratings update

# Runs every Monday at 10am ET (= 14:00 UTC during EDT) to:
#   1. Re-pull every completed StatBroadcast XML
#   2. Recompute Elo + opponent-adjusted PPD
#   3. Push parsed games + ratings to Supabase
#   4. Commit the new ratings snapshot
#
# Run after the prior week's slate has settled. Slate is generated by the
# daily-odds.yml workflow, which picks up the new ratings automatically.

on:
  schedule:
    - cron: '0 14 * * 1'  # Mondays 10am ET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Re-pull XMLs and rebuild ratings
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Pulls any newly-archived games (e.g. ones that 404'd previously)
          python scripts/backfill_2026.py
          # Recomputes Elo + PPD from all parsed games
          python -m src.pipeline.weekly_update
          # Pushes parsed games to Supabase tables
          python -m src.db.load_to_supabase

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto: weekly ratings refresh $(date -u +%Y-%m-%dZ)"
          git pull --rebase origin main
          git push
